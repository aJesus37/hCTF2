services:
  hctf-demo:
    build:
      context: ../..
      dockerfile: docker/demo/Dockerfile.demo
    ports:
      - "${PORT:-8090}:${PORT:-8090}"
    environment:
      - PORT=${PORT:-8090}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-8090}/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
