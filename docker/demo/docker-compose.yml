services:
  hctf2-demo:
    build:
      context: ../..
      dockerfile: docker/demo/Dockerfile.demo
    ports:
      - "8090:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
