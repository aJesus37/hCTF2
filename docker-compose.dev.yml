services:
  hctf2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hctf2-dev
    ports:
      - "8090:8090"
    volumes:
      # Persist database
      - ./data:/data
    command:
      - serve
      - --port
      - "8090"
      - --db
      - /data/hctf2.db
      - --dev
      - --admin-email
      - admin@hctf.local
      - --admin-password
      - changeme
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - BASE_URL=${BASE_URL:-http://localhost:8090}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    restart: on-failure
    networks:
      - hctf2-network

networks:
  hctf2-network:
    driver: bridge
