services:
  hctf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hctf-dev
    ports:
      - "${PORT:-8090}:${PORT:-8090}"
    volumes:
      # Persist database
      - ./data:/data
    command:
      - serve
      - --port
      - "${PORT:-8090}"
      - --db
      - /data/hctf.db
      - --dev
      - --admin-email
      - admin@hctf.local
      - --admin-password
      - changeme
    environment:
      - PORT=${PORT:-8090}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - BASE_URL=${BASE_URL:-http://localhost:${PORT:-8090}}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      # Optional: Umami analytics (leave empty to disable)
      - UMAMI_SCRIPT_URL=${UMAMI_SCRIPT_URL:-}
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID:-}
    restart: on-failure
    networks:
      - hctf-network

networks:
  hctf-network:
    driver: bridge
