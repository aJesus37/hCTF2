name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    # Only on PRs — lint already passed before anything lands in main
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Run linter
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Run tests
      run: go test -count=1 -timeout 120s ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    # lint is skipped on main push (result = 'skipped'), which is fine — treat as success
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Build
      run: CGO_ENABLED=0 go build -ldflags="-s -w" -o hctf2 .

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: hctf2-linux-amd64
        path: hctf2
        retention-days: 1

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Download binary
      uses: actions/download-artifact@v4
      with:
        name: hctf2-linux-amd64

    - name: Start server
      run: |
        chmod +x hctf2
        ./hctf2 serve --port 8090 --dev --db /tmp/smoke-test.db \
          --admin-email admin@test.com --admin-password testpass123 &
        for i in $(seq 1 20); do
          curl -sf http://localhost:8090/healthz && break
          sleep 1
        done

    - name: Run smoke tests
      run: |
        chmod +x scripts/smoke-test.sh
        ./scripts/smoke-test.sh
