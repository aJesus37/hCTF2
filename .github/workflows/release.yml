name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install Task
      run: go install github.com/go-task/task/v3/cmd/task@latest

    - name: Run tests
      run: task test

    - name: Build binaries
      run: |
        mkdir -p dist
        VERSION=${GITHUB_REF#refs/tags/}

        GOOS=linux   GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/hctf2-linux-amd64 .
        GOOS=linux   GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/hctf2-linux-arm64 .
        GOOS=darwin  GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/hctf2-darwin-amd64 .
        GOOS=darwin  GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/hctf2-darwin-arm64 .
        GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/hctf2-windows-amd64.exe .

    - name: Create checksums
      run: cd dist && sha256sum * > checksums.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        build-args: VERSION=${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
