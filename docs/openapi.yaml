      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              nextOrder:
                type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get the next available hint order number for a question
      tags:
      - Challenges
  /scoreboard:
    get:
      description: Returns HTML table when called from HTMX (HX-Request header), otherwise
