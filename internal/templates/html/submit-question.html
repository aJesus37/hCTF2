{{ define "correctAnswer" }}
<form class="field">
    <div class="control has-icons-right">
        <input class="input is-success" readonly type="text" value="{{ .Flag }}">
        <span class="icon is-small is-right">
            <i class="fas fa-check"></i>
          </span>
    </div>
    <div class="control">
        <span class="button is-static is-success">Submit</button>
    </div>
</form>
{{ end }}

{{ define "incorrectAnswer" }}
<form hx-post="/api/v1/questions/{{ .ID }}/answers" hx-target="this">
    <div class="control">
        <input class="input is-danger" type="text" name="flag" required placeholder="{{.FlagMask}}" x-model="flag">
    </div>
    <div class="control">
        <button type="submit" class="button">Submit</button>
    </div>
</form>
{{ end }}

{{ if eq .Success true }}
{{ template "correctAnswer" . }}
{{ else }}
{{ template "incorrectAnswer" . }}
{{ end }}
