{{define "forgot-password-content"}}
<div class="max-w-3xl mx-auto">
    <div class="bg-white dark:bg-dark-surface border border-gray-200 dark:border-dark-border rounded-lg p-8 space-y-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Forgot Password</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Enter your email to receive a password reset link</p>
        </div>

        <form hx-post="/api/auth/forgot-password"
              hx-swap="innerHTML"
              hx-target="#form-message"
              class="space-y-4">
            <div>
                <label class="block text-sm text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                <input type="email"
                       name="email"
                       placeholder="you@example.com"
                       class="w-full px-4 py-2 bg-white dark:bg-dark-bg border border-gray-300 dark:border-dark-border text-gray-900 dark:text-white rounded focus:outline-none focus:border-blue-500"
                       required
                       autofocus>
            </div>

            <button type="submit"
                    class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium transition">
                Send Reset Link
            </button>
        </form>

        <div id="form-message" class="text-center text-sm text-gray-500 dark:text-gray-400">
            <p>We'll send you a link to reset your password within 30 minutes.</p>
        </div>

        <div class="text-center text-sm">
            <a href="/login" class="text-blue-500 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300">Back to Login</a>
        </div>
    </div>
</div>
{{end}}
