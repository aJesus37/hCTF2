{{define "login-content"}}
<div class="max-w-md mx-auto">
    <div class="bg-dark-surface border border-dark-border rounded-lg p-8">
        <h1 class="text-3xl font-bold text-white mb-6 text-center">Login</h1>

        <form hx-post="/api/auth/login"
              hx-target="#message"
              hx-swap="innerHTML"
              hx-indicator="#message"
              class="space-y-4"
              @htmx:before-request="document.querySelector('#message').innerHTML = ''">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                <input type="email"
                       name="email"
                       required
                       class="w-full px-4 py-2 bg-dark-bg border border-dark-border text-white rounded focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password"
                       name="password"
                       required
                       class="w-full px-4 py-2 bg-dark-bg border border-dark-border text-white rounded focus:outline-none focus:border-blue-500">
            </div>

            <button type="submit"
                    class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium">
                Login
            </button>
            <div id="message" class="mt-4 min-h-6"></div>
        </form>

        <p class="mt-6 text-center text-sm text-gray-400">
            Don't have an account?
            <a href="/register" class="text-blue-400 hover:text-blue-300">Register here</a>
        </p>
    </div>
</div>
{{end}}
