{{define "login-content"}}
<div class="max-w-3xl mx-auto py-8 sm:py-12 md:py-16 lg:py-20">
    <div class="bg-white dark:bg-dark-surface border border-gray-200 dark:border-dark-border rounded-lg p-8">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-6 text-center">Login</h1>

        <form hx-post="/api/auth/login"
              hx-target="#message"
              hx-swap="innerHTML"
              hx-indicator="#message"
              class="space-y-4"
              @htmx:before-request="document.querySelector('#message').innerHTML = ''">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
                <input type="email"
                       name="email"
                       required
                       autofocus
                       class="w-full px-4 py-2 bg-white dark:bg-dark-bg border border-gray-300 dark:border-dark-border text-gray-900 dark:text-white rounded focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
                <input type="password"
                       name="password"
                       required
                       class="w-full px-4 py-2 bg-white dark:bg-dark-bg border border-gray-300 dark:border-dark-border text-gray-900 dark:text-white rounded focus:outline-none focus:border-blue-500">
            </div>

            <button type="submit"
                    class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium">
                Login
            </button>
            <div id="message" class="mt-4 min-h-6"></div>
        </form>

        {{if .MOTD}}
        <div class="mt-6 p-4 bg-blue-100 dark:bg-blue-900/30 border border-blue-300 dark:border-blue-600 rounded-lg">
            <div class="text-sm text-blue-800 dark:text-blue-200 text-center">{{.MOTD | safeHTML}}</div>
        </div>
        {{end}}

        <div class="mt-6 space-y-2 text-center text-sm text-gray-500 dark:text-gray-400">
            <p>
                Don't have an account?
                <a href="/register" class="text-blue-500 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300">Register here</a>
            </p>
            <p>
                <a href="/forgot-password" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300">Forgot password?</a>
            </p>
        </div>
    </div>
</div>
{{end}}
