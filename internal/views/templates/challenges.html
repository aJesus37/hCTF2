{{define "challenges-content"}}
<div x-data="{ category: 'all', difficulty: 'all', searchQuery: '' }">
    <div class="mb-8">
        <h1 class="text-4xl font-bold text-blue-400 mb-4">Challenges</h1>
        <p class="text-gray-300">Solve challenges to earn points and climb the scoreboard</p>
    </div>

    <div class="mb-6 flex gap-4 flex-wrap">
        <div>
            <label class="text-sm text-gray-400">Category:</label>
            <select x-model="category" class="ml-2 bg-dark-surface border border-dark-border text-white rounded px-3 py-1">
                <option value="all">All</option>
                {{range .Categories}}
                <option value="{{.Name}}">{{.Name}}</option>
                {{end}}
            </select>
        </div>
        <div>
            <label class="text-sm text-gray-400">Difficulty:</label>
            <select x-model="difficulty" class="ml-2 bg-dark-surface border border-dark-border text-white rounded px-3 py-1">
                <option value="all">All</option>
                {{range .Difficulties}}
                <option value="{{.Name}}">{{.Name}}</option>
                {{end}}
            </select>
        </div>
        <div>
            <label class="text-sm text-gray-400">Search:</label>
            <input
                type="text"
                x-model="searchQuery"
                placeholder="Search challenges..."
                class="ml-2 bg-dark-surface border border-dark-border text-white rounded px-3 py-1 w-64 focus:outline-none focus:border-blue-500">
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {{range .Challenges}}
    <div class="bg-dark-surface border border-dark-border rounded-lg p-6 hover:border-blue-500 transition"
         data-search-name="{{.Name}}"
         data-search-desc="{{stripMarkdown .Description}}"
         data-categories="{{.Category}}"
         x-show="(category === 'all' || $el.dataset.categories.split(',').map(s=>s.trim()).includes(category)) && (difficulty === 'all' || difficulty === '{{.Difficulty}}') && (searchQuery === '' || $el.dataset.searchName.toLowerCase().includes(searchQuery.toLowerCase()) || $el.dataset.searchDesc.toLowerCase().includes(searchQuery.toLowerCase()))">
        <div class="flex justify-between items-start mb-4">
            <h3 class="text-xl font-bold text-white">{{.Name}}</h3>
            <span class="px-2 py-1 text-xs rounded {{difficultyBadge .Difficulty}}">
                {{.Difficulty}}
            </span>
        </div>
        <p class="text-sm text-gray-400 mb-2">
            {{range $i, $cat := splitCategories .Category}}{{if $i}}, {{end}}<span class="text-blue-400">{{$cat}}</span>{{end}}
        </p>
        <div class="text-gray-300 mb-4 line-clamp-3 prose prose-invert prose-sm max-w-none">{{markdown .Description}}</div>
        <a href="/challenges/{{.ID}}" class="inline-block px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm">
            View Challenge
        </a>
    </div>
    {{end}}
    </div>
</div>
{{end}}
