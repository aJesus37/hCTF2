{{define "challenges-content"}}
<div class="mb-8">
    <h1 class="text-4xl font-bold text-blue-400 mb-4">Challenges</h1>
    <p class="text-gray-300">Solve challenges to earn points and climb the scoreboard</p>
</div>

<div class="mb-6 flex gap-4" x-data="{ category: 'all', difficulty: 'all' }">
    <div>
        <label class="text-sm text-gray-400">Category:</label>
        <select x-model="category" class="ml-2 bg-dark-surface border border-dark-border text-white rounded px-3 py-1">
            <option value="all">All</option>
            <option value="web">Web</option>
            <option value="crypto">Crypto</option>
            <option value="pwn">Pwn</option>
            <option value="forensics">Forensics</option>
            <option value="misc">Misc</option>
        </select>
    </div>
    <div>
        <label class="text-sm text-gray-400">Difficulty:</label>
        <select x-model="difficulty" class="ml-2 bg-dark-surface border border-dark-border text-white rounded px-3 py-1">
            <option value="all">All</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {{range .Challenges}}
    <div class="bg-dark-surface border border-dark-border rounded-lg p-6 hover:border-blue-500 transition"
         x-show="(category === 'all' || category === '{{.Category}}') && (difficulty === 'all' || difficulty === '{{.Difficulty}}')">
        <div class="flex justify-between items-start mb-4">
            <h3 class="text-xl font-bold text-white">{{.Name}}</h3>
            <span class="px-2 py-1 text-xs rounded
                {{if eq .Difficulty "easy"}}bg-green-600 text-green-100
                {{else if eq .Difficulty "medium"}}bg-yellow-600 text-yellow-100
                {{else}}bg-red-600 text-red-100{{end}}">
                {{.Difficulty}}
            </span>
        </div>
        <p class="text-sm text-gray-400 mb-2">Category: <span class="text-blue-400">{{.Category}}</span></p>
        <p class="text-gray-300 mb-4 line-clamp-3">{{.Description}}</p>
        <a href="/challenges/{{.ID}}" class="inline-block px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm">
            View Challenge
        </a>
    </div>
    {{end}}
</div>
{{end}}
