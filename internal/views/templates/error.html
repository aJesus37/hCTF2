{{define "error-content"}}
<div class="flex-grow flex items-center justify-center px-4">
    <div class="text-center max-w-md">
        <h1 class="text-6xl font-bold text-red-500 mb-4">{{.StatusCode}}</h1>
        <h2 class="text-3xl font-bold text-white mb-4">{{.Title}}</h2>
        <p class="text-gray-400 mb-8">{{.Message}}</p>
        <div class="flex gap-4 justify-center">
            <a href="/" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium transition">
                Home
            </a>
            {{if ne .StatusCode 403}}
            <a href="/login" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium transition">
                Login
            </a>
            {{end}}
        </div>
    </div>
</div>
{{end}}
