{{define "docs-content"}}
<div class="min-h-screen bg-white dark:bg-dark-surface">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">API Documentation</h1>
        <p class="text-gray-600 dark:text-gray-300 mb-8">
            The hCTF2 REST API provides programmatic access to challenges, teams, submissions, and scoreboard data.
            Use this interactive documentation to explore available endpoints, request/response formats, and authentication requirements.
        </p>
        <div id="redoc-container" class="rounded-lg border border-gray-200 dark:border-dark-border overflow-hidden"></div>
    </div>
</div>

<!-- Use Swagger UI with custom dark theme -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<style>
    /* Swagger UI Dark Theme - Native dark mode support */
    .dark .swagger-ui {
        background: #1e293b;
    }
    
    /* Top bar / Info section */
    .dark .swagger-ui .topbar,
    .dark .swagger-ui .info {
        background: #1e293b !important;
    }
    .dark .swagger-ui .info .title,
    .dark .swagger-ui .info p,
    .dark .swagger-ui .info li,
    .dark .swagger-ui .info .base-url {
        color: #e2e8f0 !important;
    }
    .dark .swagger-ui .info a {
        color: #60a5fa !important;
    }
    
    /* Scheme container (servers section) */
    .dark .swagger-ui .scheme-container {
        background: #0f172a !important;
        box-shadow: none;
    }
    .dark .swagger-ui .scheme-container .schemes > label {
        color: #e2e8f0 !important;
    }
    
    /* Operation blocks - default styling */
    .dark .swagger-ui .opblock {
        background: #1e293b;
        border-color: #334155;
    }
    .dark .swagger-ui .opblock .opblock-summary {
        border-color: #334155;
    }
    .dark .swagger-ui .opblock .opblock-summary-method {
        color: #fff;
    }
    .dark .swagger-ui .opblock .opblock-summary-path,
    .dark .swagger-ui .opblock .opblock-summary-description {
        color: #e2e8f0;
    }
    .dark .swagger-ui .opblock-tag {
        color: #e2e8f0;
        border-color: #334155;
    }
    .dark .swagger-ui .opblock-tag:hover {
        background: rgba(255,255,255,0.05);
    }
    
    /* Operation blocks - HTTP method colors for dark theme */
    .dark .swagger-ui .opblock.opblock-post {
        background: rgba(34, 197, 94, 0.1);
        border-color: rgba(34, 197, 94, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-post .opblock-summary {
        border-color: rgba(34, 197, 94, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-post .opblock-summary-method {
        background: #22c55e;
    }
    
    .dark .swagger-ui .opblock.opblock-delete {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-delete .opblock-summary {
        border-color: rgba(239, 68, 68, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-delete .opblock-summary-method {
        background: #ef4444;
    }
    
    .dark .swagger-ui .opblock.opblock-put {
        background: rgba(249, 115, 22, 0.1);
        border-color: rgba(249, 115, 22, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-put .opblock-summary {
        border-color: rgba(249, 115, 22, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-put .opblock-summary-method {
        background: #f97316;
    }
    
    .dark .swagger-ui .opblock.opblock-get {
        background: rgba(59, 130, 246, 0.1);
        border-color: rgba(59, 130, 246, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-get .opblock-summary {
        border-color: rgba(59, 130, 246, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-get .opblock-summary-method {
        background: #3b82f6;
    }
    
    .dark .swagger-ui .opblock.opblock-patch {
        background: rgba(168, 85, 247, 0.1);
        border-color: rgba(168, 85, 247, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-patch .opblock-summary {
        border-color: rgba(168, 85, 247, 0.4);
    }
    .dark .swagger-ui .opblock.opblock-patch .opblock-summary-method {
        background: #a855f7;
    }
    
    /* Section headers */
    .dark .swagger-ui .opblock-section-header {
        background: #0f172a;
        border-color: #334155;
    }
    .dark .swagger-ui .opblock-section-header h4 {
        color: #e2e8f0;
    }
    .dark .swagger-ui .opblock-section-header label {
        color: #94a3b8;
    }
    .dark .swagger-ui .opblock-section-header .btn {
        background: #3b82f6;
        border-color: #3b82f6;
        color: #fff;
    }
    
    /* Tab headers - tablinks are BUTTON elements, not A */
    .dark .swagger-ui .tab li button.tablinks,
    .dark .swagger-ui button.tablinks {
        color: #cbd5e1 !important;
    }
    .dark .swagger-ui .tab li.active button.tablinks,
    .dark .swagger-ui button.tablinks.active,
    .dark .swagger-ui button.tablinks:hover {
        color: #60a5fa !important;
    }
    
    /* Parameters */
    .dark .swagger-ui .parameter__name {
        color: #e2e8f0;
    }
    .dark .swagger-ui .parameter__type {
        color: #94a3b8;
    }
    .dark .swagger-ui .parameter__in {
        color: #64748b;
    }
    .dark .swagger-ui .parameter__deprecated,
    .dark .swagger-ui .parameter__empty_value_toggle {
        color: #94a3b8;
    }
    
    /* Response section */
    .dark .swagger-ui .responses-inner h4,
    .dark .swagger-ui .responses-inner h5 {
        color: #e2e8f0;
    }
    .dark .swagger-ui .response-col_status {
        color: #e2e8f0;
    }
    .dark .swagger-ui .response-col_description {
        color: #cbd5e1;
    }
    
    /* Tables */
    .dark .swagger-ui table thead tr th,
    .dark .swagger-ui table thead tr td {
        color: #e2e8f0;
        border-color: #334155;
    }
    .dark .swagger-ui table tbody tr td {
        color: #cbd5e1;
        border-color: #334155;
    }
    .dark .swagger-ui table tbody tr:nth-child(odd) {
        background: rgba(255,255,255,0.02);
    }
    
    /* Code samples */
    .dark .swagger-ui .highlight-code {
        background: #0f172a;
    }
    .dark .swagger-ui .highlight-code .microlight {
        color: #e2e8f0;
    }
    
    /* "No parameters" and empty states */
    .dark .swagger-ui .opblock-description-wrapper p,
    .dark .swagger-ui .opblock-external-docs-wrapper p,
    .dark .swagger-ui .opblock-title_normal p {
        color: #94a3b8 !important;
    }
    
    /* Response tabs */
    .dark .swagger-ui .responses-header td {
        color: #e2e8f0;
    }
    
    /* Model toggle / expand links */
    .dark .swagger-ui .model-box-control {
        color: #60a5fa;
    }
    
    /* Body parameter examples */
    .dark .swagger-ui .body-param__example {
        color: #94a3b8;
    }
    
    /* Models / Schemas */
    .dark .swagger-ui .model-title {
        color: #e2e8f0;
    }
    .dark .swagger-ui .model-box {
        background: #0f172a;
        border-color: #334155;
    }
    .dark .swagger-ui .model .property.primitive {
        color: #94a3b8;
    }
    .dark .swagger-ui .prop-type {
        color: #60a5fa;
    }
    .dark .swagger-ui .prop-format {
        color: #64748b;
    }
    .dark .swagger-ui .model-hint {
        color: #64748b;
    }
    
    /* Buttons */
    .dark .swagger-ui .btn {
        background: #334155;
        border-color: #475569;
        color: #e2e8f0;
    }
    .dark .swagger-ui .btn:hover {
        background: #475569;
    }
    .dark .swagger-ui .btn.execute {
        background: #22c55e;
        border-color: #22c55e;
        color: #fff;
    }
    .dark .swagger-ui .btn.authorize {
        background: #3b82f6;
        border-color: #3b82f6;
        color: #fff;
    }
    
    /* Select dropdowns */
    .dark .swagger-ui select {
        background: #0f172a;
        border-color: #334155;
        color: #e2e8f0;
    }
    
    /* Input fields */
    .dark .swagger-ui input[type="text"],
    .dark .swagger-ui textarea {
        background: #0f172a;
        border-color: #334155;
        color: #e2e8f0;
    }
    
    /* Curl command */
    .dark .swagger-ui .curl {
        background: #0f172a;
        border-color: #334155;
    }
    .dark .swagger-ui .curl-command {
        color: #e2e8f0;
    }
    
    /* Errors */
    .dark .swagger-ui .errors-wrapper {
        background: rgba(239, 68, 68, 0.1);
        border-color: #ef4444;
    }
    .dark .swagger-ui .errors .message th {
        color: #ef4444;
    }
    
    /* Authorization Modal - Dark Theme */
    .dark .swagger-ui .dialog-ux {
        background: rgba(0, 0, 0, 0.7);
    }
    .dark .swagger-ui .modal-ux {
        background: #1e293b;
        border-color: #334155;
    }
    .dark .swagger-ui .modal-ux-header {
        background: #0f172a;
        border-color: #334155;
    }
    .dark .swagger-ui .modal-ux-header h3,
    .dark .swagger-ui .modal-ux-header h4 {
        color: #e2e8f0;
    }
    .dark .swagger-ui .modal-ux-content {
        background: #1e293b;
    }
    .dark .swagger-ui .modal-ux-content h4,
    .dark .swagger-ui .modal-ux-content h5,
    .dark .swagger-ui .modal-ux-content h6 {
        color: #e2e8f0;
    }
    .dark .swagger-ui .modal-ux-content p {
        color: #cbd5e1;
    }
    .dark .swagger-ui .modal-ux-content label {
        color: #e2e8f0;
    }
    .dark .swagger-ui .modal-ux-content input[type="text"] {
        background: #0f172a;
        border-color: #334155;
        color: #e2e8f0;
    }
    .dark .swagger-ui .modal-ux-content .close-modal {
        color: #94a3b8;
    }
    .dark .swagger-ui .modal-ux-content .close-modal:hover {
        color: #e2e8f0;
    }
</style>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        SwaggerUIBundle({
            url: '/api/openapi.yaml',
            dom_id: '#redoc-container',
            deepLinking: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIBundle.presets.standalone
            ],
            plugins: [
                SwaggerUIBundle.plugins.DownloadUrl
            ],
            layout: "BaseLayout",
            validatorUrl: null
        });
    });
</script>
{{end}}
