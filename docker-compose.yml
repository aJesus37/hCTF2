services:
  hctf2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hctf2
    ports:
      - "8090:8090"
    volumes:
      # Persist database
      - hctf2-data:/data
    command:
      - serve
      - --port
      - "8090"
      - --db
      - /data/hctf2.db
      # Uncomment to create admin user on first run
      # - --admin-email
      # - admin@hctf.local
      # - --admin-password
      # - changeme
    environment:
      - JWT_SECRET=${JWT_SECRET:-}
      - BASE_URL=${BASE_URL:-http://localhost:8090}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    restart: unless-stopped
    # NOTE: healthcheck is omitted — the runtime image is based on scratch (no shell,
    # wget, or curl available). Use an external probe (e.g. Traefik, Caddy, or
    # Kubernetes liveness probe) against http://<host>:8090/healthz if needed.
    networks:
      - hctf2-network

volumes:
  hctf2-data:
    driver: local

networks:
  hctf2-network:
    driver: bridge
