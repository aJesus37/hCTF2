services:
  hctf2:
    image: ghcr.io/ajesus37/hctf2:latest
    container_name: hctf2
    ports:
      - "8090:8090"
    volumes:
      # Persist database
      - hctf2-data:/data
    command:
      - serve
      - --port
      - "8090"
      - --db
      - /data/hctf2.db
      # Uncomment to create admin user on first run
      # - --admin-email
      # - admin@hctf.local
      # - --admin-password
      # - changeme
    environment:
      - JWT_SECRET=${JWT_SECRET:-}
      - BASE_URL=${BASE_URL:-http://localhost:8090}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      # Optional: Umami analytics (leave empty to disable)
      - UMAMI_SCRIPT_URL=${UMAMI_SCRIPT_URL:-}
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID:-}
    restart: unless-stopped
    healthcheck:
      test: ["/hctf2", "healthcheck", "--port", "8090"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - hctf2-network

volumes:
  hctf2-data:
    driver: local

networks:
  hctf2-network:
    driver: bridge
