services:
  hctf2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hctf2
    ports:
      - "8090:8090"
    volumes:
      # Persist database
      - hctf2-data:/app/data
    environment:
      # Optional: Set admin credentials on first run
      # Uncomment and change these values
      # ADMIN_EMAIL: admin@hctf.local
      # ADMIN_PASSWORD: changeme
    command:
      - --port
      - "8090"
      - --db
      - /app/data/hctf2.db
      # Uncomment to create admin user on first run
      # - --admin-email
      # - admin@hctf.local
      # - --admin-password
      # - changeme
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - hctf2-network

volumes:
  hctf2-data:
    driver: local

networks:
  hctf2-network:
    driver: bridge
